<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — SellAnythingKE</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script>(function(){const t=localStorage.getItem("theme");if(t)document.documentElement.setAttribute("data-theme",t)})();</script>
  <style>
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--muted); font-size: 13px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .google-btn {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 11px 20px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius); cursor: pointer; font-size: 14px;
      font-weight: 500; color: var(--text); transition: all .18s;
      text-decoration: none;
    }
    .google-btn:hover { border-color: #4285f4; box-shadow: 0 2px 8px rgba(66,133,244,.2); }
    .google-logo {
      width: 20px; height: 20px; flex-shrink: 0;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">SellAnythingKE</a>
    <div id="nav-auth"></div>
  </div>
</nav>

<div class="container auth-page">
  <div class="auth-card">
    <div class="form-card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to your SellAnythingKE account</p>

      <!-- Google login -->
      <a href="/api/auth/google" class="google-btn">
        <svg class="google-logo" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </a>

      <div class="divider">or login with email</div>

      <div id="error-msg" style="display:none;color:#dc2626;background:#fee2e2;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:14px;"></div>

      <div class="form-group">
        <label>Email address</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Log In</button>

      <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--muted)">
        Don't have an account? <a href="/register.html" style="color:var(--brand);font-weight:500">Register here</a>
      </p>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
  window.addEventListener("DOMContentLoaded", () => {
    updateNav();

    // Handle Google OAuth redirect
    const params = new URLSearchParams(location.search);
    const token  = params.get("token");
    const error  = params.get("error");

    if (token) {
      const user = {
        id:     parseInt(params.get("id")),
        name:   params.get("name"),
        email:  params.get("email"),
        avatar: params.get("avatar") || null,
      };
      saveAuth(token, user);
      window.location.href = "/";
      return;
    }

    if (error === "cancelled") showError("Login was cancelled.");
    if (error === "failed")    showError("Google login failed. Please try again.");

    if (isLoggedIn()) { window.location.href = "/"; return; }

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });
  });

  async function doLogin() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("login-btn");

    document.getElementById("error-msg").style.display = "none";
    if (!email || !password) { showError("Please fill in all fields."); return; }

    btn.disabled = true; btn.textContent = "Logging in…";
    try {
      const { token, user } = await api.login({ email, password });
      saveAuth(token, user);
      window.location.href = "/";
    } catch (e) {
      showError(e.message);
      btn.disabled = false; btn.textContent = "Log In";
    }
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg; el.style.display = "block";
  }
</script>
</body>
</html>
