<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Marketplace KE</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Marketplace KE</a>
    <div id="nav-auth"></div>
  </div>
</nav>

<div class="container auth-page">
  <div class="auth-card">
    <div class="form-card">
      <h1>Welcome back</h1>
      <p class="sub">Log in to your Marketplace KE account</p>

      <div id="error-msg" style="display:none;color:#dc2626;background:#fee2e2;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:14px;"></div>

      <div class="form-group">
        <label>Email address</label>
        <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">Log In</button>

      <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--muted)">
        Don't have an account? <a href="/register.html" style="color:var(--brand);font-weight:500">Register here</a>
      </p>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
  window.addEventListener("DOMContentLoaded", () => {
    if (isLoggedIn()) window.location.href = "/";
    updateNav();
    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") doLogin();
    });
  });

  async function doLogin() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("login-btn");

    document.getElementById("error-msg").style.display = "none";
    if (!email || !password) { showError("Please fill in all fields."); return; }

    btn.disabled = true; btn.textContent = "Logging in…";
    try {
      const { token, user } = await api.login({ email, password });
      saveAuth(token, user);
      window.location.href = "/";
    } catch (e) {
      showError(e.message);
      btn.disabled = false; btn.textContent = "Log In";
    }
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg; el.style.display = "block";
  }
</script>
</body>
</html>
