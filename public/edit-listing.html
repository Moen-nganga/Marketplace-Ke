<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
  (function() {
    const t = localStorage.getItem("theme");
    if (t) document.documentElement.setAttribute("data-theme", t);
  })();
</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Listing — SellAnythingKE</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .tags-input-wrap {
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 8px 12px; background: var(--bg); cursor: text;
      transition: border-color .18s; min-height: 46px;
    }
    .tags-input-wrap:focus-within { border-color: var(--brand); background: #fff; }
    .tag-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: #fff0e6; color: var(--brand);
      border: 1px solid #ffd4b3; border-radius: 20px;
      padding: 3px 10px; font-size: 13px; font-weight: 500;
    }
    .tag-pill button {
      background: none; border: none; cursor: pointer;
      color: var(--brand); font-size: 15px; line-height: 1;
      padding: 0; display: flex; align-items: center;
    }
    #tag-text {
      border: none; outline: none; background: transparent;
      font-size: 14px; flex: 1; min-width: 100px;
    }
    .tag-suggestions {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;
    }
    .tag-suggestion {
      padding: 4px 12px; border-radius: 20px; font-size: 12px;
      background: var(--surface); border: 1px solid var(--border);
      cursor: pointer; transition: all .18s; font-weight: 500;
    }
    .tag-suggestion:hover { border-color: var(--brand); color: var(--brand); background: #fff0e6; }
    .existing-images { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .existing-thumb {
      width: 90px; height: 90px; border-radius: 8px; overflow: hidden;
      border: 2px solid var(--border); position: relative;
    }
    .existing-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .existing-thumb .remove-img {
      position: absolute; top: 4px; left: 4px;
      width: 20px; height: 20px; border-radius: 50%;
      background: rgba(0,0,0,.7); color: #fff;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; transition: background .15s;
    }
    .existing-thumb .remove-img:hover { background: #dc2626; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">SellAnythingKE</a>
    <div id="nav-auth"></div>
  </div>
</nav>

<div class="container page-body" style="max-width:700px">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <h1 style="margin-bottom:6px">Edit Listing</h1>
  <p style="color:var(--muted);margin-bottom:24px">Update your listing details below.</p>

  <div class="form-card">
    <div id="error-msg" style="display:none;color:#dc2626;background:#fee2e2;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:14px;"></div>

    <div class="form-group">
      <label>Title *</label>
      <input id="title" type="text" maxlength="120" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Category *</label>
        <select id="category"></select>
      </div>
      <div class="form-group">
        <label>Condition *</label>
        <select id="condition" onchange="toggleReason()">
          <option value="">Select condition</option>
          <option value="new">New</option>
          <option value="used_like_new">Used – Like New</option>
          <option value="used_good">Used – Good</option>
          <option value="used_fair">Used – Fair</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Price (KSh) *</label>
        <input id="price" type="number" min="0" />
      </div>
      <div class="form-group">
        <label>Location *</label>
        <input id="location" type="text" />
      </div>
    </div>

    <div class="form-group">
      <label>Description *</label>
      <textarea id="description" style="min-height:110px"></textarea>
    </div>

    <div class="form-group" id="reason-group" style="display:none">
      <label>Reason for selling *</label>
      <textarea id="reason" style="min-height:70px"></textarea>
      <div class="form-hint">Buyers appreciate knowing why you're selling</div>
    </div>

    <div class="form-group">
      <label>Tags <span style="color:var(--muted);font-weight:400">(up to 5)</span></label>
      <div class="tags-input-wrap" onclick="document.getElementById('tag-text').focus()">
        <div id="tags-pills"></div>
        <input id="tag-text" type="text" placeholder="Type a tag and press Enter…" maxlength="30" />
      </div>
      <div class="tag-suggestions" id="tag-suggestions"></div>
    </div>

    <div class="form-group">
      <label>Current Photos</label>
      <div class="existing-images" id="existing-images"></div>
      <div class="form-hint" style="margin-top:8px">Click × to remove a photo</div>
    </div>

    <div class="form-group">
      <label>Add More Photos <span style="color:var(--muted);font-weight:400">(up to 6 total)</span></label>
      <input id="new-images" type="file" accept="image/*" multiple style="padding:8px 0;border:none;background:none" />
    </div>

    <button class="btn btn-primary btn-full" id="save-btn" onclick="saveChanges()" style="margin-top:8px;padding:14px">
      Save Changes
    </button>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
  const listingId  = parseInt(new URLSearchParams(location.search).get("id"));
  const me         = getUser();
  const tags       = [];
  let   keepImages = []; // existing image URLs to keep

  window.addEventListener("DOMContentLoaded", async () => {
    if (!me) { window.location.href = "/login.html"; return; }
    updateNav();
    await loadCategories();
    await loadListing();

    document.getElementById("tag-text").addEventListener("keydown", handleTagInput);
    document.getElementById("tag-text").addEventListener("input",   fetchTagSuggestions);
  });

  // ── Load categories ───────────────────────────────────────────────────────
  async function loadCategories() {
    const cats = await api.getCategories();
    let html = `<option value="">Select category</option>`;
    cats.forEach(parent => {
      if (parent.children && parent.children.length) {
        html += `<optgroup label="${parent.icon} ${parent.name}">`;
        parent.children.forEach(child => {
          html += `<option value="${child.id}">${child.icon} ${child.name}</option>`;
        });
        html += `</optgroup>`;
      } else {
        html += `<option value="${parent.id}">${parent.icon} ${parent.name}</option>`;
      }
    });
    document.getElementById("category").innerHTML = html;
  }

  // ── Load existing listing data ────────────────────────────────────────────
  async function loadListing() {
    try {
      const l = await api.getListing(listingId);

      // Make sure only the owner can edit
      if (l.user_id !== me.id) {
        window.location.href = `/listing.html?id=${listingId}`;
        return;
      }

      // Populate fields
      document.getElementById("title").value       = l.title;
      document.getElementById("price").value       = l.price;
      document.getElementById("location").value    = l.location;
      document.getElementById("description").value = l.description;
      document.getElementById("condition").value   = l.condition;
      document.getElementById("category").value    = l.category_id;
      if (l.reason) document.getElementById("reason").value = l.reason;
      toggleReason();

      // Load existing tags
      (l.tags || []).forEach(t => { tags.push(t); });
      renderTagPills();

      // Load existing images
      keepImages = [...(l.images || [])];
      renderExistingImages();
    } catch (e) {
      showError(e.message);
    }
  }

  // ── Existing images ───────────────────────────────────────────────────────
  function renderExistingImages() {
    const box = document.getElementById("existing-images");
    if (!keepImages.length) {
      box.innerHTML = `<p style="font-size:13px;color:var(--muted)">No photos</p>`;
      return;
    }
    box.innerHTML = keepImages.map((src, i) => `
      <div class="existing-thumb">
        <img src="${src}" alt="Photo ${i+1}" />
        <button type="button" class="remove-img" onclick="removeExistingImage(${i})">×</button>
      </div>`).join("");
  }

  function removeExistingImage(index) {
    keepImages.splice(index, 1);
    renderExistingImages();
  }

  // ── Save changes ──────────────────────────────────────────────────────────
  async function saveChanges() {
    const title       = document.getElementById("title").value.trim();
    const category_id = document.getElementById("category").value;
    const condition   = document.getElementById("condition").value;
    const price       = document.getElementById("price").value;
    const location    = document.getElementById("location").value.trim();
    const description = document.getElementById("description").value.trim();
    const reasonEl    = document.getElementById("reason");
    const reason      = reasonEl ? reasonEl.value.trim() : "";
    const isUsed      = condition && condition !== "new";
    const newFiles    = document.getElementById("new-images").files;
    const btn         = document.getElementById("save-btn");

    document.getElementById("error-msg").style.display = "none";

    if (!title || !category_id || !condition || !price || !location || !description) {
      showError("Please fill in all required fields."); return;
    }
    if (isUsed && !reason) {
      showError("Please add a reason for selling since the item is used."); return;
    }

    btn.disabled = true; btn.textContent = "Saving…";

    try {
      // First update the text fields
      await api.updateListing(listingId, {
        title, category_id, condition,
        price:       parseFloat(price),
        location,    description,
        reason:      isUsed ? reason : null,
        tags:        JSON.stringify(tags),
        images:      JSON.stringify(keepImages),
      });

      // If there are new images, upload them via a separate call
      if (newFiles.length) {
        const fd = new FormData();
        fd.append("title",       title);
        fd.append("category_id", category_id);
        fd.append("condition",   condition);
        fd.append("price",       price);
        fd.append("location",    location);
        fd.append("description", description);
        if (isUsed) fd.append("reason", reason);
        fd.append("tags",   JSON.stringify(tags));
        fd.append("keepImages", JSON.stringify(keepImages));
        Array.from(newFiles).slice(0, 6 - keepImages.length).forEach(f => fd.append("images", f));
        await apiFetch(`/listings/${listingId}/images`, { method: "POST", body: fd });
      }

      toast("Listing updated!", "success");
      setTimeout(() => window.location.href = `/listing.html?id=${listingId}`, 1000);
    } catch (e) {
      showError(e.message);
      btn.disabled = false; btn.textContent = "Save Changes";
    }
  }

  // ── Toggle reason ─────────────────────────────────────────────────────────
  function toggleReason() {
    const condition = document.getElementById("condition").value;
    const isUsed    = condition && condition !== "new";
    document.getElementById("reason-group").style.display = isUsed ? "" : "none";
  }

  // ── Tags ──────────────────────────────────────────────────────────────────
  function handleTagInput(e) {
    if (e.key === "Enter" || e.key === ",") {
      e.preventDefault();
      addTag(e.target.value.trim());
    } else if (e.key === "Backspace" && e.target.value === "" && tags.length) {
      removeTag(tags.length - 1);
    }
  }

  function addTag(val) {
    val = val.replace(/,/g, "").trim().toLowerCase();
    if (!val)               return;
    if (tags.length >= 5)   { toast("Maximum 5 tags allowed", "error"); return; }
    if (tags.includes(val)) { toast("Tag already added", "error"); return; }
    tags.push(val);
    renderTagPills();
    document.getElementById("tag-text").value = "";
    document.getElementById("tag-suggestions").innerHTML = "";
  }

  function removeTag(index) {
    tags.splice(index, 1);
    renderTagPills();
  }

  function renderTagPills() {
    const input   = document.getElementById("tag-text");
    const pillsEl = document.getElementById("tags-pills");
    pillsEl.innerHTML = tags.map((t, i) => `
      <span class="tag-pill">
        #${t}
        <button type="button" onclick="removeTag(${i})">×</button>
      </span>`).join("");
    input.placeholder = tags.length >= 5 ? "Max 5 tags reached" : "Type a tag and press Enter…";
    input.disabled    = tags.length >= 5;
  }

  let suggestTimer = null;
  async function fetchTagSuggestions() {
    const val = document.getElementById("tag-text").value.trim();
    clearTimeout(suggestTimer);
    if (!val) { document.getElementById("tag-suggestions").innerHTML = ""; return; }
    suggestTimer = setTimeout(async () => {
      try {
        const suggestions = await api.suggestTags(val);
        const filtered    = suggestions.filter(s => !tags.includes(s));
        document.getElementById("tag-suggestions").innerHTML = filtered.length
          ? filtered.map(s => `<span class="tag-suggestion" onclick="addTag('${s}')">#${s}</span>`).join("")
          : "";
      } catch {}
    }, 300);
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg; el.style.display = "block";
  }
</script>
</body>
</html>
