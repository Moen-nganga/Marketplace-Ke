<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — SellAnythingKE</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">SellAnythingKE</a>
    <div id="nav-auth"></div>
  </div>
</nav>

<div class="container auth-page">
  <div class="auth-card" style="max-width:460px">
    <div class="form-card">
      <h1>Create account</h1>
      <p class="sub">Join thousands of buyers and sellers on SellAnythingKE</p>

      <div id="error-msg" style="display:none;color:#dc2626;background:#fee2e2;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:14px;"></div>

      <div class="form-group">
        <label>Full name</label>
        <input id="name" type="text" placeholder="John Kamau" />
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input id="email" type="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Phone number <span style="color:var(--muted);font-weight:400">(optional)</span></label>
        <input id="phone" type="tel" placeholder="+254 7XX XXX XXX" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="password" type="password" placeholder="At least 6 characters" />
      </div>

      <button class="btn btn-primary btn-full" id="reg-btn" onclick="doRegister()">Create Account</button>

      <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--muted)">
        Already have an account? <a href="/login.html" style="color:var(--brand);font-weight:500">Log in</a>
      </p>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
  window.addEventListener("DOMContentLoaded", () => {
    if (isLoggedIn()) window.location.href = "/";
    updateNav();
  });

  async function doRegister() {
    const name     = document.getElementById("name").value.trim();
    const email    = document.getElementById("email").value.trim();
    const phone    = document.getElementById("phone").value.trim();
    const password = document.getElementById("password").value;
    const btn      = document.getElementById("reg-btn");

    document.getElementById("error-msg").style.display = "none";
    if (!name || !email || !password) { showError("Please fill in all required fields."); return; }

    btn.disabled = true; btn.textContent = "Creating account…";
    try {
      const { token, user } = await api.register({ name, email, phone, password });
      saveAuth(token, user);
      window.location.href = "/";
    } catch (e) {
      showError(e.message);
      btn.disabled = false; btn.textContent = "Create Account";
    }
  }

  function showError(msg) {
    const el = document.getElementById("error-msg");
    el.textContent = msg; el.style.display = "block";
  }
</script>
</body>
</html>
