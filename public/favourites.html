<div class="container page-body" style="max-width:1100px">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px">
    <div>
      <h1 style="margin-bottom:4px">♥ My Favourites</h1>
      <p style="color:var(--muted);font-size:14px">Listings you've saved for later</p>
    </div>
    <button class="back-btn" onclick="history.back()">← Back</button>
  </div>

  <div id="favourites-grid" class="listings-grid"></div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
  window.addEventListener("DOMContentLoaded", async () => {
    if (!isLoggedIn()) { window.location.href = "/login.html"; return; }
    updateNav();
    await loadFavourites();
  });

  async function loadFavourites() {
    const grid = document.getElementById("favourites-grid");
    grid.innerHTML = skeletonCards(6);

    try {
      const listings = await api.getSaved();

      if (!listings.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <div class="icon">♡</div>
            <h3>No favorites added</h3>
          </div>`;
        return;
      }

      grid.innerHTML = listings.map(l => {
        const img   = l.images?.length
          ? `<img src="${l.images[0]}" alt="${l.title}" loading="lazy" />`
          : `<span>${l.category_icon || "📦"}</span>`;
        const badge = l.condition === "new" ? "badge-new" : (l.status === "sold" ? "badge-sold" : "badge-used");

        return `
          <div class="listing-card" style="position:relative">
            <div class="card-img" onclick="window.location='/listing.html?id=${l.id}'" style="cursor:pointer">
              ${img}
              ${l.status === "sold" ? `<div style="position:absolute;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center">
                <span style="background:#ef4444;color:#fff;padding:6px 16px;border-radius:20px;font-weight:700;font-size:13px">SOLD</span>
              </div>` : ""}
            </div>
            <div class="card-body">
              <div class="card-price" onclick="window.location='/listing.html?id=${l.id}'" style="cursor:pointer">${formatPrice(l.price)}</div>
              <div class="card-title" onclick="window.location='/listing.html?id=${l.id}'" style="cursor:pointer">${l.title}</div>
              <div class="card-meta">
                <span class="badge ${badge}">${l.status === "sold" ? "Sold" : conditionLabel(l.condition)}</span>
                <span>📍 ${l.location}</span>
              </div>
              <div class="card-meta" style="margin-top:4px;justify-content:space-between">
                <span>${timeAgo(l.created_at)}</span>
                <button onclick="unsave(${l.id}, this)"
                        style="background:none;border:none;cursor:pointer;color:#ef4444;font-size:18px"
                        title="Remove from favourites">♥</button>
              </div>
            </div>
          </div>`;
      }).join("");
    } catch (e) {
      grid.innerHTML = `<p style="color:red;grid-column:1/-1">${e.message}</p>`;
    }
  }

  async function unsave(id, btn) {
    try {
      await api.unsaveListing(id);
      toast("Removed from favourites", "success");
      btn.closest(".listing-card").style.opacity = "0";
      btn.closest(".listing-card").style.transition = "opacity .3s";
      setTimeout(loadFavourites, 350);
    } catch (e) { toast(e.message, "error"); }
  }

  function skeletonCards(n) {
    return Array.from({length: n}, () => `
      <div class="listing-card">
        <div class="card-img skeleton" style="aspect-ratio:4/3"></div>
        <div class="card-body">
          <div class="skeleton" style="height:18px;width:60%;margin-bottom:8px"></div>
          <div class="skeleton" style="height:14px;width:85%;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:45%"></div>
        </div>
      </div>`).join("");
  }
</script>
