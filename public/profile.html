<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Marketplace KE</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .profile-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      display: flex;
      align-items: flex-start;
      gap: 24px;
      margin-bottom: 24px;
    }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--brand); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-info h1 { font-size: 24px; margin-bottom: 4px; }
    .profile-meta { color: var(--muted); font-size: 13px; display: flex; gap: 16px; flex-wrap: wrap; margin-top: 6px; }

    /* Stars */
    .stars-row { display: flex; align-items: center; gap: 6px; margin: 10px 0; }
    .star { font-size: 24px; color: #ddd; transition: color .15s; }
    .star.filled { color: #f59e0b; }
    .star.interactive { cursor: pointer; }
    .star.interactive:hover { color: #f59e0b; }
    .rating-score { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: var(--text); }
    .rating-count { font-size: 13px; color: var(--muted); }

    .rating-card {
      background: var(--bg); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 10px;
    }
    .rating-card .rc-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .rating-card .rc-name { font-weight: 600; font-size: 14px; }
    .rating-card .rc-stars .star { font-size: 15px; }
    .rating-card .rc-review { font-size: 13px; color: var(--muted); }
    .rating-card .rc-time { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .rate-box {
      background: var(--bg); border-radius: var(--radius);
      padding: 20px; margin-top: 16px; border: 1.5px dashed var(--border);
    }
    .rate-box h3 { font-size: 15px; margin-bottom: 12px; }

    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
    .tab {
      padding: 10px 20px; cursor: pointer; font-weight: 600; font-size: 14px;
      color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px;
      transition: all .18s;
    }
    .tab.active { color: var(--brand); border-bottom-color: var(--brand); }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="/" class="nav-logo">Marketplace KE</a>
    <div id="nav-auth"></div>
  </div>
</nav>

<main class="container page-body">

  <!-- Profile header -->
  <div id="profile-header">
    <div class="profile-header">
      <div class="skeleton profile-avatar" style="background:#eee"></div>
      <div style="flex:1">
        <div class="skeleton" style="height:28px;width:40%;margin-bottom:10px"></div>
        <div class="skeleton" style="height:16px;width:60%"></div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('listings', this)">Listings</div>
    <div class="tab"        onclick="switchTab('ratings',  this)">Ratings & Reviews</div>
  </div>

  <!-- Tab content -->
  <div id="tab-listings"></div>
  <div id="tab-ratings" style="display:none"></div>

</main>

<div class="toast-container" id="toast-container"></div>

<script src="/js/api.js"></script>
<script>
  const params     = new URLSearchParams(location.search);
  const profileId  = parseInt(params.get("id"));
  const me         = getUser();
  const isOwnProfile = me && me.id === profileId;

  let pendingScore = 0;
  let profileData  = null;

  window.addEventListener("DOMContentLoaded", async () => {
    updateNav();
    if (!profileId) { window.location.href = "/"; return; }
    await loadProfile();
    await Promise.all([loadListings(), loadRatings()]);
  });

  // ── Profile header ──────────────────────────────────────────────────────────
  async function loadProfile() {
    try {
      const [user, listings] = await Promise.all([
        api.getPublicUser(profileId),
        api.getUserListings(profileId),
      ]);

      profileData = { ...user, listings };
      renderHeader(user.name, listings.length);
    } catch {
      document.getElementById("profile-header").innerHTML =
        `<div class="empty-state"><div class="icon">😕</div><h3>User not found</h3></div>`;
    }
  }

  function renderHeader(name, listingCount) {
    const initial = name[0].toUpperCase();
    const chatBtn = (!isOwnProfile && me) ? `
      <button class="btn btn-primary" onclick="startChat()">💬 Message Seller</button>` : "";
    const ownBadge = isOwnProfile
      ? `<span style="background:#fff0e6;color:var(--brand);padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600">Your Profile</span>` : "";

    document.getElementById("profile-header").innerHTML = `
      <div class="profile-header">
        <div class="profile-avatar">${initial}</div>
        <div class="profile-info">
          <h1>${name} ${ownBadge}</h1>
          <div id="header-stars"></div>
          <div class="profile-meta">
            <span>📦 ${listingCount} listing${listingCount !== 1 ? "s" : ""}</span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-end">
          ${chatBtn}
        </div>
      </div>`;
  }

  // ── Listings tab ─────────────────────────────────────────────────────────────
  async function loadListings() {
    const el = document.getElementById("tab-listings");
    el.innerHTML = `<div class="listings-grid">${skeletonCards(4)}</div>`;
    try {
      const listings = await api.getUserListings(profileId);
      if (!listings.length) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <h3>No listings yet</h3>
            <p>${isOwnProfile ? "You haven't posted anything yet." : "This user has no active listings."}</p>
            ${isOwnProfile ? `<a href="/post-ad.html" class="btn btn-primary" style="margin-top:16px">+ Post your first ad</a>` : ""}
          </div>`;
        return;
      }
      el.innerHTML = `<div class="listings-grid">${listings.map(listingCard).join("")}</div>`;
    } catch (e) {
      el.innerHTML = `<p style="color:red">${e.message}</p>`;
    }
  }

  function listingCard(l) {
    const img   = l.images?.length
      ? `<img src="${l.images[0]}" alt="${l.title}" loading="lazy" />`
      : `<span>${l.category_icon || "📦"}</span>`;
    const badge = l.condition === "new" ? "badge-new" : (l.status === "sold" ? "badge-sold" : "badge-used");
    return `
      <div class="listing-card" onclick="window.location='/listing.html?id=${l.id}'">
        <div class="card-img">${img}</div>
        <div class="card-body">
          <div class="card-price">${formatPrice(l.price)}</div>
          <div class="card-title">${l.title}</div>
          <div class="card-meta">
            <span class="badge ${badge}">${l.status === "sold" ? "Sold" : conditionLabel(l.condition)}</span>
            <span>📍 ${l.location}</span>
          </div>
          <div class="card-meta" style="margin-top:4px">${timeAgo(l.created_at)}</div>
        </div>
      </div>`;
  }

  // ── Ratings tab ──────────────────────────────────────────────────────────────
  async function loadRatings() {
    const el = document.getElementById("tab-ratings");
    try {
      const { ratings, average, total } = await api.getRatings(profileId);

      // Update header stars
      const starsEl = document.getElementById("header-stars");
      if (starsEl) {
        starsEl.innerHTML = `
          <div class="stars-row">
            ${renderStars(average || 0)}
            <span style="font-size:14px;font-weight:600;color:var(--text)">${average || "—"}</span>
            <span class="rating-count">(${total} review${total !== 1 ? "s" : ""})</span>
          </div>`;
      }

      // Check if current user already rated
      const myRating = me ? ratings.find(r => r.rater_id === me.id) : null;

      // Rate box — only show if logged in and not own profile
      const rateBox = (!isOwnProfile && me) ? (myRating ? `
        <div class="rate-box">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
            <div>
              <div style="font-weight:600;font-size:14px;margin-bottom:4px">Your review</div>
              <div class="stars-row" style="margin:0;gap:3px">
                ${renderStars(myRating.score)}
              </div>
              ${myRating.review ? `<div style="font-size:13px;color:var(--muted);margin-top:6px">"${myRating.review}"</div>` : ""}
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-ghost" onclick="showRateForm()">✏️ Edit</button>
              <button class="btn btn-ghost" style="color:#dc2626;border-color:#dc2626" onclick="removeRating()">Remove</button>
            </div>
          </div>
        </div>
        <div class="rate-box" id="rate-form" style="display:none;margin-top:12px">
          <h3>Update your review</h3>
          <div class="stars-row" id="interactive-stars">
            ${renderStars(myRating.score, true)}
          </div>
          <div class="form-group" style="margin-top:12px">
            <textarea id="review-text" placeholder="Leave a review (optional)" style="min-height:70px">${myRating.review || ""}</textarea>
          </div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-primary" onclick="submitRating()">Update Review</button>
            <button class="btn btn-ghost" onclick="hideRateForm()">Cancel</button>
          </div>
        </div>` :
        `<div class="rate-box">
          <h3>Rate this seller</h3>
          <div class="stars-row" id="interactive-stars">
            ${renderStars(0, true)}
          </div>
          <div class="form-group" style="margin-top:12px">
            <textarea id="review-text" placeholder="Leave a review (optional)" style="min-height:70px"></textarea>
          </div>
          <div style="display:flex;gap:10px">
            <button class="btn btn-primary" onclick="submitRating()">Submit Review</button>
          </div>
        </div>`) : "";

      const reviewList = ratings.length
        ? ratings.map(r => `
            <div class="rating-card">
              <div class="rc-top">
                <span class="rc-name">${r.rater_name}</span>
                <span class="rc-stars">${renderStars(r.score)}</span>
              </div>
              ${r.review ? `<div class="rc-review">${r.review}</div>` : ""}
              <div class="rc-time">${timeAgo(r.created_at)}</div>
            </div>`).join("")
        : `<div class="empty-state" style="padding:30px 0">
             <div class="icon">⭐</div>
             <h3>No reviews yet</h3>
             <p>Be the first to leave a review</p>
           </div>`;

      el.innerHTML = rateBox + `<div style="margin-top:20px">${reviewList}</div>`;
      pendingScore = myRating?.score || 0;
    } catch (e) {
      el.innerHTML = `<p style="color:red">${e.message}</p>`;
    }
  }

  // ── Star interaction ─────────────────────────────────────────────────────────
  function handleStarClick(val) {
    pendingScore = val;
    document.querySelectorAll(".interactive").forEach((s, i) => {
      s.classList.toggle("filled", i < val);
    });
  }
  function highlightStars(val) {
    document.querySelectorAll(".interactive").forEach((s, i) => {
      s.classList.toggle("filled", i < val);
    });
  }
  function resetStars() {
    document.querySelectorAll(".interactive").forEach((s, i) => {
      s.classList.toggle("filled", i < pendingScore);
    });
  }
  function showRateForm() {
    document.getElementById("rate-form").style.display = "";
    pendingScore = 0;
  }
  function hideRateForm() {
    document.getElementById("rate-form").style.display = "none";
  }

  // ── Submit / remove rating ───────────────────────────────────────────────────
  async function submitRating() {
    if (!pendingScore) { toast("Please select a star rating", "error"); return; }
    const review = document.getElementById("review-text").value.trim();
    try {
      await api.submitRating(profileId, { score: pendingScore, review });
      toast("Review submitted!", "success");
      await loadRatings();
    } catch (e) { toast(e.message, "error"); }
  }

  async function removeRating() {
    if (!confirm("Remove your review?")) return;
    try {
      await api.deleteRating(profileId);
      toast("Review removed", "success");
      pendingScore = 0;
      await loadRatings();
    } catch (e) { toast(e.message, "error"); }
  }

  // ── Start chat ───────────────────────────────────────────────────────────────
  async function startChat() {
    if (!me) { window.location.href = "/login.html"; return; }
    try {
      const conv = await api.startConversation({ other_id: profileId });
      window.location.href = `/chat.html?id=${conv.id}`;
    } catch (e) { toast(e.message, "error"); }
  }

  // ── Tabs ─────────────────────────────────────────────────────────────────────
  function switchTab(name, el) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    document.getElementById("tab-listings").style.display = name === "listings" ? "" : "none";
    document.getElementById("tab-ratings").style.display  = name === "ratings"  ? "" : "none";
  }

  function skeletonCards(n) {
    return Array.from({ length: n }, () => `
      <div class="listing-card">
        <div class="card-img skeleton" style="aspect-ratio:4/3"></div>
        <div class="card-body">
          <div class="skeleton" style="height:18px;width:60%;margin-bottom:8px"></div>
          <div class="skeleton" style="height:14px;width:85%;margin-bottom:6px"></div>
          <div class="skeleton" style="height:12px;width:45%"></div>
        </div>
      </div>`).join("");
  }
</script>
</body>
</html>
